<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>English Tense Puzzle Pro</title>
<style>
:root { --main: #007bff; --accent: #ff4757; --part: #2ed573; --aux: #ffa502; --bg: #f0f2f5; }
body{font-family:'Segoe UI',Meiryo,sans-serif;background-color:var(--bg);padding:8px;color:#1c1e21;margin:0;padding-bottom:30px}
.container{max-width:600px;margin:auto;background:white;padding:15px;border-radius:15px;box-shadow:0 5px 15px rgba(0,0,0,0.1)}

.header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
h1{margin:0;font-size:1.1rem;color:var(--main);flex-grow:1}
.lang-switch{display:flex;gap:2px}
.lang-btn{padding:3px 8px;font-size:0.7rem;cursor:pointer;border:1px solid #ddd;border-radius:4px;background:#fff}
.lang-btn.active{background:var(--main);color:white;border-color:var(--main)}

input[type="text"]{width:100%;padding:10px;margin:5px 0;border:2px solid #ddd;border-radius:10px;box-sizing:border-box;font-size:1rem;text-align:center;transition: border-color 0.3s;}
input[type="text"]:focus{border-color: var(--main); outline: none;}
.result-box{background:#f8f9fa;border:2px dashed var(--main);padding:12px;margin:5px 0;font-weight:bold;color:#333;font-size:1.1rem;border-radius:10px;text-align:center;min-height:1.2em;line-height:1.3}

.button-group{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:8px}
.label{font-size:0.7rem;color:#606770;margin:8px 0 4px 0;font-weight:bold}

.tense-matrix { display: flex; flex-direction: column; gap: 4px; }
.tense-row { display: flex; align-items: center; gap: 4px; }
.aspect-label { flex: 0 0 65px; font-size: 0.65rem; font-weight: bold; color: #444; background: #eee; padding: 6px 2px; border-radius: 4px; text-align: center; }
.time-btns { display: flex; flex: 1; gap: 4px; }
.time-btns button { flex: 1; padding: 8px 0; font-size: 0.75rem; border: none; border-radius: 6px; background-color: #e4e6eb; cursor: pointer; font-weight: bold; transition: 0.2s; }
.time-btns button.active { background-color: var(--main); color: white; }

.c-aux { color: var(--aux); } .c-be { color: var(--part); } .c-v { color: var(--accent); }

.dict-section{margin-top:20px;padding-top:10px;border-top:1px dotted #eee}
.dict-row{display:flex;gap:3px;margin-bottom:4px}
.dict-row input{flex:1;padding:6px;font-size:0.7rem;border:1px solid #ccc;border-radius:4px;text-align:center;min-width:0}
.add-btn{background:var(--part);color:white;padding:5px 10px;border-radius:4px;font-size:0.7rem; font-weight: bold;}
.dict-list{max-height:80px;overflow-y:auto;font-size:0.65rem;margin-top:5px}
.dict-item{display:flex;justify-content:space-between;padding:3px;border-bottom:1px solid #f0f0f0}
</style>
</head>
<body>
<div class="container">
    <div class="header-row">
        <h1 id="title">English Tense Puzzle</h1>
        <div class="lang-switch">
            <button id="btn-ja" class="lang-btn active" onclick="setLang('ja')">JP</button>
            <button id="btn-en" class="lang-btn" onclick="setLang('en')">EN</button>
        </div>
    </div>

    <div class="label" id="lbl-input">1. 例文入力</div>
    <input type="text" id="userInput" value="You play tennis" oninput="convert()" onfocus="handleFocus(this)" onblur="handleBlur(this)">
    
    <div class="label" id="lbl-result">2. パズルの結果</div>
    <div class="result-box" id="resultText"></div>
    
    <div class="label" id="lbl-type">3. 文のタイプ</div>
    <div class="button-group">
        <button id="mode-pos" onclick="setMode('pos',this)" class="active">肯定</button>
        <button id="mode-neg" onclick="setMode('neg',this)">否定</button>
        <button id="mode-int" onclick="setMode('int',this)">疑問</button>
    </div>
    
    <div class="label" id="lbl-tense">4. 時制を選択</div>
    <div class="tense-matrix" id="tenseMatrix"></div>

    <div class="dict-section">
        <div class="label" id="lbl-dict">5. 動詞を追加</div>
        <div class="dict-row">
            <input type="text" id="d-base" placeholder="原形">
            <input type="text" id="d-past" placeholder="過去">
            <input type="text" id="d-pp" placeholder="過去分">
            <input type="text" id="d-s" placeholder="-s">
            <input type="text" id="d-ing" placeholder="-ing">
            <button class="add-btn" onclick="saveVerb()">＋</button>
        </div>
        <div class="dict-list" id="dictList"></div>
    </div>
</div>

<script>
let currentMode='pos', tTime='present', tAspect='simple', currentLang='ja';
let myDict = JSON.parse(localStorage.getItem('myTenseDict')) || {};
let lastValue = "You play tennis";

const i18n = {
    ja: { title: "English Tense Puzzle", input: "1. 例文入力", result: "2. パズルの結果", type: "3. 文のタイプ", tense: "4. 時制を選択", dict: "5. 動詞を追加", pos: "肯定", neg: "否定", int: "疑問", present: "現在", past: "過去", future: "未来", simple: "基本形", cont: "進行形", perf: "完了形", p_cont: "完進形", d_base: "原形", d_past: "過去", d_pp: "過去分", d_s: "-s", d_ing: "-ing" },
    en: { title: "English Tense Puzzle", input: "1. Sentence", result: "2. Result", type: "3. Type", tense: "4. Tense", dict: "5. Add Verb", pos: "Aff.", neg: "Neg.", int: "Int.", present: "Pres.", past: "Past", future: "Fut.", simple: "Simple", cont: "Cont.", perf: "Perf.", p_cont: "P-Cont", d_base: "Base", d_past: "Past", d_pp: "P.P.", d_s: "-s", d_ing: "-ing" }
};

function handleFocus(elm) { lastValue = elm.value; elm.value = ""; }
function handleBlur(elm) { if (elm.value === "") { elm.value = lastValue; convert(); } }

const defaultIrregulars = {'become':{past:'became',pp:'become'},'begin':{past:'began',pp:'begun'},'break':{past:'broke',pp:'broken'},'bring':{past:'brought',pp:'brought'},'buy':{past:'bought',pp:'bought'},'catch':{past:'caught',pp:'caught'},'choose':{past:'chose',pp:'chosen'},'come':{past:'came',pp:'come'},'do':{past:'did',pp:'done'},'draw':{past:'drew',pp:'drawn'},'drink':{past:'drank',pp:'drunk'},'drive':{past:'drove',pp:'driven'},'eat':{past:'ate',pp:'eaten'},'feel':{past:'felt',pp:'felt'},'find':{past:'found',pp:'found'},'get':{past:'got',pp:'gotten'},'give':{past:'gave',pp:'given'},'go':{past:'went',pp:'gone'},'grow':{past:'grew',pp:'grown'},'have':{past:'had',pp:'had'},'hear':{past:'heard',pp:'heard'},'know':{past:'knew',pp:'known'},'leave':{past:'left',pp:'left'},'make':{past:'made',pp:'made'},'meet':{past:'met',pp:'met'},'pay':{past:'paid',pp:'paid'},'put':{past:'put',pp:'put'},'read':{past:'read',pp:'read'},'run':{past:'ran',pp:'run'},'say':{past:'said',pp:'said'},'see':{past:'saw',pp:'seen'},'send':{past:'sent',pp:'sent'},'sing':{past:'sang',pp:'sung'},'sit':{past:'sat',pp:'sat'},'sleep':{past:'slept',pp:'slept'},'speak':{past:'spoke',pp:'spoken'},'take':{past:'took',pp:'taken'},'teach':{past:'taught',pp:'taught'},'tell':{past:'told',pp:'told'},'think':{past:'thought',pp:'thought'},'write':{past:'written',pp:'written'}};

function saveVerb(){
    const b = document.getElementById('d-base').value.trim().toLowerCase();
    const p = document.getElementById('d-past').value.trim().toLowerCase();
    const pp = document.getElementById('d-pp').value.trim().toLowerCase();
    const s = document.getElementById('d-s').value.trim().toLowerCase();
    const ing = document.getElementById('d-ing').value.trim().toLowerCase();
    if(!b || !p || !pp || !s || !ing) { alert("全て入力してください"); return; }
    myDict[b] = { past:p, pp:pp, s:s, ing:ing };
    localStorage.setItem('myTenseDict', JSON.stringify(myDict));
    renderDict();
    ['d-base','d-past','d-pp','d-s','d-ing'].forEach(id=>document.getElementById(id).value='');
    convert();
}

function deleteVerb(b){ delete myDict[b]; localStorage.setItem('myTenseDict', JSON.stringify(myDict)); renderDict(); convert(); }
function renderDict(){
    const list = document.getElementById('dictList'); list.innerHTML = '';
    for(let b in myDict){
        const item = document.createElement('div'); item.className = 'dict-item';
        item.innerHTML = `<span><b>${b}</b></span><button style="background:var(--accent);color:white;border:none;border-radius:3px;font-size:0.5rem" onclick="deleteVerb('${b}')">×</button>`;
        list.appendChild(item);
    }
}

function getBaseVerb(v) {
    v = v.toLowerCase().replace(/[^a-z]/g, "");
    if (/^(am|is|are|was|were|be)$/.test(v)) return 'be';
    for (let b in myDict) if (myDict[b].past === v || myDict[b].pp === v || myDict[b].s === v || myDict[b].ing === v || b === v) return b;
    for (let b in defaultIrregulars) if (defaultIrregulars[b].past === v || defaultIrregulars[b].pp === v || b === v) return b;
    if (v.endsWith('ies')) return v.slice(0, -3) + 'y';
    if (v.endsWith('es')) {
        if (/sses$|shes$|ches$|xes$/.test(v)) return v.slice(0, -2);
        if (v === 'goes') return 'go'; if (v === 'does') return 'do';
    }
    if (v.endsWith('s') && !v.endsWith('ss')) return v.slice(0, -1);
    if (v.endsWith('ed')) {
        if (v.endsWith('ied')) return v.slice(0, -3) + 'y';
        return v.slice(0, -2);
    }
    return v;
}

const span=(t,c)=>`<span class="${c}">${t}</span>`;
const cap=(s)=>s.charAt(0).toUpperCase()+s.slice(1);

function convert(){
    const rawInput=document.getElementById('userInput').value.trim();
    if(!rawInput) { document.getElementById('resultText').innerHTML = ""; return; }
    const words = rawInput.replace(/\.|\?|!$/g,"").split(/\s+/);
    let subjectOrig = words[0], verbRaw = words[1] || "", rest = words.slice(2).join(" ");
    if(!verbRaw) { document.getElementById('resultText').innerHTML = rawInput + (currentMode==='int'?"?":"."); return; }
    let vBase = getBaseVerb(verbRaw), sLow = subjectOrig.toLowerCase();
    let sInt = (sLow === 'i') ? 'I' : sLow;
    const is3rd = !['i','you'].includes(sLow) && !sLow.includes('and') && !sLow.endsWith('s');
    const isBe = (vBase === 'be');
    let v_s = myDict[vBase] ? myDict[vBase].s : (vBase==='go'||vBase==='do'?vBase+'es':(vBase==='have'?'has':(vBase.endsWith('y')?vBase.slice(0,-1)+'ies':vBase+'s')));
    let v_pst = myDict[vBase] ? myDict[vBase].past : (defaultIrregulars[vBase]?defaultIrregulars[vBase].past:(vBase.endsWith('e')?vBase+'d':vBase+'ed'));
    let v_pp = myDict[vBase] ? myDict[vBase].pp : (defaultIrregulars[vBase]?defaultIrregulars[vBase].pp:(vBase.endsWith('e')?vBase+'d':vBase+'ed'));
    let v_ing = myDict[vBase] ? myDict[vBase].ing : (vBase.endsWith('e')?vBase.slice(0,-1)+'ing':vBase+'ing');
    let beP = (sLow==='i')?'am':(is3rd?'is':'are'), bePa = (sLow==='i'||is3rd)?'was':'were', haveP = is3rd ? 'has' : 'have';
    let res = "";
    if(currentMode==='pos'){
        if(tTime==='present'){
            if(tAspect==='simple') res = `${subjectOrig} ${isBe?span(beP,'c-be'):(is3rd?span(v_s,'c-v'):vBase)} ${rest}`;
            else if(tAspect==='cont') res = `${subjectOrig} ${span(beP,'c-be')} ${span(v_ing,'c-v')} ${rest}`;
            else if(tAspect==='perf') res = `${subjectOrig} ${span(haveP,'c-aux')} ${span(v_pp,'c-v')} ${rest}`;
            else res = `${subjectOrig} ${span(haveP,'c-aux')} ${span('been','c-be')} ${span(v_ing,'c-v')} ${rest}`;
        } else if(tTime==='past'){
            if(tAspect==='simple') res = `${subjectOrig} ${isBe?span(bePa,'c-be'):span(v_pst,'c-v')} ${rest}`;
            else if(tAspect==='cont') res = `${subjectOrig} ${span(bePa,'c-be')} ${span(v_ing,'c-v')} ${rest}`;
            else if(tAspect==='perf') res = `${subjectOrig} ${span('had','c-aux')} ${span(v_pp,'c-v')} ${rest}`;
            else res = `${subjectOrig} ${span('had','c-aux')} ${span('been','c-be')} ${span(v_ing,'c-v')} ${rest}`;
        } else {
            let fB = isBe?span('be','c-be'):vBase;
            if(tAspect==='simple') res = `${subjectOrig} ${span('will','c-aux')} ${fB} ${rest}`;
            else if(tAspect==='cont') res = `${subjectOrig} ${span('will','c-aux')} ${span('be','c-be')} ${span(v_ing,'c-v')} ${rest}`;
            else if(tAspect==='perf') res = `${subjectOrig} ${span('will','c-aux')} ${span('have','c-aux')} ${span(v_pp,'c-v')} ${rest}`;
            else res = `${subjectOrig} ${span('will','c-aux')} ${span('have','c-aux')} ${span('been','c-be')} ${span(v_ing,'c-v')} ${rest}`;
        }
    } else if(currentMode==='neg'){
        let n = span('not','c-aux');
        if(tTime==='present'){
            if(tAspect==='simple') res = isBe?`${subjectOrig} ${span(beP,'c-be')} ${n} ${rest}`:`${subjectOrig} ${span(is3rd?'does':'do','c-aux')} ${n} ${vBase} ${rest}`;
            else if(tAspect==='cont') res = `${subjectOrig} ${span(beP,'c-be')} ${n} ${span(v_ing,'c-v')} ${rest}`;
            else if(tAspect==='perf') res = `${subjectOrig} ${span(haveP,'c-aux')} ${n} ${span(v_pp,'c-v')} ${rest}`;
            else res = `${subjectOrig} ${span(haveP,'c-aux')} ${n} ${span('been','c-be')} ${span(v_ing,'c-v')} ${rest}`;
        } else if(tTime==='past'){
            if(tAspect==='simple') res = isBe?`${subjectOrig} ${span(bePa,'c-be')} ${n} ${rest}`:`${subjectOrig} ${span('did','c-aux')} ${n} ${vBase} ${rest}`;
            else if(tAspect==='cont') res = `${subjectOrig} ${span(bePa,'c-be')} ${n} ${span(v_ing,'c-v')} ${rest}`;
            else if(tAspect==='perf') res = `${subjectOrig} ${span('had','c-aux')} ${n} ${span(v_pp,'c-v')} ${rest}`;
            else res = `${subjectOrig} ${span('had','c-aux')} ${n} ${span('been','c-be')} ${span(v_ing,'c-v')} ${rest}`;
        } else {
            let a = `${span('will','c-aux')} ${n}`;
            if(tAspect==='simple') res = `${subjectOrig} ${a} ${isBe?span('be','c-be'):vBase} ${rest}`;
            else if(tAspect==='cont') res = `${subjectOrig} ${a} ${span('be','c-be')} ${span(v_ing,'c-v')} ${rest}`;
            else if(tAspect==='perf') res = `${subjectOrig} ${a} ${span('have','c-aux')} ${span(v_pp,'c-v')} ${rest}`;
            else res = `${subjectOrig} ${a} ${span('have','c-aux')} ${span('been','c-be')} ${span(v_ing,'c-v')} ${rest}`;
        }
    } else {
        if(tTime==='present'){
            if(tAspect==='simple') res = isBe?`${span(cap(beP),'c-be')} ${sInt} ${rest}`:`${span(is3rd?'Does':'Do','c-aux')} ${sInt} ${vBase} ${rest}`;
            else if(tAspect==='cont') res = `${span(cap(beP),'c-be')} ${sInt} ${span(v_ing,'c-v')} ${rest}`;
            else if(tAspect==='perf') res = `${span(cap(haveP),'c-aux')} ${sInt} ${span(v_pp,'c-v')} ${rest}`;
            else res = `${span(cap(haveP),'c-aux')} ${sInt} ${span('been','c-be')} ${span(v_ing,'c-v')} ${rest}`;
        } else if(tTime==='past'){
            if(tAspect==='simple') res = isBe?`${span(cap(bePa),'c-be')} ${sInt} ${rest}`:`${span('Did','c-aux')} ${sInt} ${vBase} ${rest}`;
            else if(tAspect==='cont') res = `${span(cap(bePa),'c-be')} ${sInt} ${span(v_ing,'c-v')} ${rest}`;
            else if(tAspect==='perf') res = `${span('Had','c-aux')} ${sInt} ${span(v_pp,'c-v')} ${rest}`;
            else res = `${span('Had','c-aux')} ${sInt} ${span('been','c-be')} ${span(v_ing,'c-v')} ${rest}`;
        } else {
            let a = span('Will','c-aux');
            if(tAspect==='simple') res = `${a} ${sInt} ${isBe?span('be','c-be'):vBase} ${rest}`;
            else if(tAspect==='cont') res = `${a} ${sInt} ${span('be','c-be')} ${span(v_ing,'c-v')} ${rest}`;
            else if(tAspect==='perf') res = `${a} ${sInt} ${span('have','c-aux')} ${span(v_pp,'c-v')} ${rest}`;
            else res = `${a} ${sInt} ${span('have','c-aux')} ${span('been','c-be')} ${span(v_ing,'c-v')} ${rest}`;
        }
    }
    let f = res.trim().replace(/\s+/g, " ");
    if(currentMode==='int') { if(!f.endsWith('?')) f += '?'; } else { if(!f.endsWith('.')) f += '.'; }
    document.getElementById('resultText').innerHTML = f;
}

function setMode(m, e){ currentMode = m; document.querySelectorAll('.button-group button').forEach(b => b.classList.remove('active')); e.classList.add('active'); convert(); }

function updateTense(time, aspect){
    tTime = time; tAspect = aspect;
    renderTenseMatrix();
    convert();
}

function renderTenseMatrix(){
    const matrix = document.getElementById('tenseMatrix'), t = i18n[currentLang];
    matrix.innerHTML = '';
    const aspects = ['simple', 'cont', 'perf', 'p_cont'];
    const times = ['present', 'past', 'future'];
    aspects.forEach(a => {
        const row = document.createElement('div'); row.className = 'tense-row';
        const label = document.createElement('div'); label.className = 'aspect-label';
        label.innerText = t[a]; row.appendChild(label);
        const btns = document.createElement('div'); btns.className = 'time-btns';
        times.forEach(ti => {
            const btn = document.createElement('button'); btn.innerText = t[ti];
            if(ti === tTime && a === tAspect) btn.classList.add('active');
            btn.onclick = () => updateTense(ti, a); btns.appendChild(btn);
        });
        row.appendChild(btns); matrix.appendChild(row);
    });
}

function setLang(l){
    currentLang = l; 
    document.getElementById('btn-ja').classList.toggle('active', l==='ja'); 
    document.getElementById('btn-en').classList.toggle('active', l==='en');
    
    // ラベルの更新
    ['title','lbl-input','lbl-result','lbl-type','lbl-tense','lbl-dict','mode-pos','mode-neg','mode-int'].forEach(id => {
        let key = id.replace('lbl-','').replace('mode-',''); if(document.getElementById(id)) document.getElementById(id).innerText = i18n[l][key];
    });

    // 動詞入力欄のプレースホルダー更新
    ['d-base','d-past','d-pp','d-s','d-ing'].forEach(id => {
        let key = id.replace('-','_');
        document.getElementById(id).placeholder = i18n[l][key];
    });

    renderTenseMatrix(); convert();
}
window.onload = () => { renderDict(); setLang('ja'); };
</script>
</body>
</html>
